services:
  auth-db:
    image: postgres:16.4
    container_name: flashsupport-auth-db
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-flashsupport_auth}
      POSTGRES_USER: ${AUTH_POSTGRES_USER:-flashsupport_auth}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-flashsupport_auth}
    volumes:
      - flashsupport-auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER:-flashsupport_auth} -d ${AUTH_POSTGRES_DB:-flashsupport_auth}"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: "./services/Auth Service"
    container_name: flashsupport-auth-service
    env_file:
      - "./services/Auth Service/.env.${AUTH_SERVICE_ENV:?AUTH_SERVICE_ENV is required (dev|prod)}"
    environment:
      AUTH_SERVICE_ENV: ${AUTH_SERVICE_ENV:?AUTH_SERVICE_ENV is required (dev|prod)}
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8070/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    container_name: flashsupport-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flashsupport_dev}
      POSTGRES_USER: ${POSTGRES_USER:-flashsupport_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashsupport_dev}
    volumes:
      - flashsupport-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flashsupport_dev} -d ${POSTGRES_DB:-flashsupport_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  llm-runtime:
    build:
      context: "./services/LLM Runtime"
    container_name: flashsupport-llm-runtime
    env_file:
      - "./services/LLM Runtime/.env.${LLM_RUNTIME_ENV:?LLM_RUNTIME_ENV is required (dev|prod)}"
    environment:
      LLM_RUNTIME_ENV: ${LLM_RUNTIME_ENV:?LLM_RUNTIME_ENV is required (dev|prod)}
    depends_on:
      auth-service:
        condition: service_healthy
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  rag-service:
    build:
      context: "./services/RAG Engine"
    container_name: flashsupport-rag-service
    env_file:
      - "./services/RAG Engine/.env.${RAG_ENGINE_ENV:?RAG_ENGINE_ENV is required (dev|prod)}"
    environment:
      RAG_ENGINE_ENV: ${RAG_ENGINE_ENV:?RAG_ENGINE_ENV is required (dev|prod)}
    depends_on:
      postgres:
        condition: service_healthy
      llm-runtime:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
  chat-orchestrator:
    build:
      context: "./services/Chat Orchestrator"
    container_name: flashsupport-chat-orchestrator
    env_file:
      - "./services/Chat Orchestrator/.env.${CHAT_ORCHESTRATOR_ENV:?CHAT_ORCHESTRATOR_ENV is required (dev|prod)}"
    environment:
      CHAT_ORCHESTRATOR_ENV: ${CHAT_ORCHESTRATOR_ENV:?CHAT_ORCHESTRATOR_ENV is required (dev|prod)}
    ports:
      - "8090:8090"
    depends_on:
      rag-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  web-service:
    build:
      context: "./services/Web Service"
    container_name: flashsupport-web-service
    env_file:
      - "./services/Web Service/.env.${WEB_SERVICE_ENV:?WEB_SERVICE_ENV is required (dev|prod)}"
    environment:
      WEB_SERVICE_ENV: ${WEB_SERVICE_ENV:?WEB_SERVICE_ENV is required (dev|prod)}
    ports:
      - "8060:8060"
    depends_on:
      rag-service:
        condition: service_healthy
      chat-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8060/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  flashsupport-auth-db-data:
  flashsupport-postgres-data:
